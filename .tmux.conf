# Required for system notifications and accepting plan in new session context
set -g allow-passthrough on

# Set the terminal type to support italics and modern features
set -g default-terminal "tmux-256color"

# Enable TrueColor (24-bit) support for Claude's UI and diffs
# This tells tmux that the 'outside' terminal (iTerm2) is Tc/RGB capable
# Note: if you change your iTerm2 color settings, you might need to update this line
set -as terminal-features ",xterm-256color:RGB"

# Ensure system clipboard works seamlessly
set -s set-clipboard on

# Automatically renumber windows if you open/close multiple native tabs
set -g renumber-windows on

# Allow Claude to receive Shift+Enter correctly
set -s extended-keys on
bind-key -n S-Enter send-keys Escape "[13;2u"

# Recommended via Vanta Slack (#eng-ona / #dev-tips)
set -g mouse on
set -g history-limit 100000
set -g prefix C-a
